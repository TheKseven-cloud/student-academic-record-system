<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Academic Portal</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="particles"></div>

<div class="container">

    <!-- HERO -->

    <div class="hero">

        <div class="hero-content">

            <span class="hero-badge">
                Academic Intelligence System
            </span>

            <h1>
                Student Academic Portal
            </h1>

            <p>
                Manage semester records, SGPA and ATKT information
                from a single dashboard.
            </p>

        </div>

    </div>

    <div class="stats-bar">

    <div class="stat-card">
        <span class="stat-number">4</span>
        <span class="stat-label">Semesters</span>
    </div>

    <div class="stat-card">
        <span class="stat-number">ATKT</span>
        <span class="stat-label">Tracking</span>
    </div>

    <div class="stat-card">
        <span class="stat-number">2026</span>
        <span class="stat-label">Academic Year</span>
    </div>

</div>

    <!-- MAIN DASHBOARD -->

    <div class="dashboard">

        <!-- STUDENT PROFILE -->

        <section class="profile-card">

            <div class="section-header">

                <h2>
                    Student Information
                </h2>

            </div>

            <div class="profile-grid">

                <div class="form-group">

                    <label>
                        Student Name
                    </label>

                    <input
                    type="text"
                    id="studentName">

                </div>

                <div class="form-group">

                    <label>
                        Roll Number
                    </label>

                    <input
                    type="number"
                    id="rollNumber">

                </div>

                <div class="form-group">

                    <label>
                        Student Mobile Number
                    </label>

                    <input
                    type="tel"
                    id="studentMobile">

                </div>

                <div class="form-group">

                    <label>
                        Parent Mobile Number
                    </label>

                    <input
                    type="tel"
                    id="parentMobile">

                </div>

            </div>

        </section>

        <!-- SEMESTERS -->

        <div class="semester-grid">

            <!-- SEM 1 -->

            <section class="semester-card">

                <h2>
                    Semester 1
                </h2>

                <div class="form-group">

                    <label>
                        Result Status
                    </label>

                    <select
                    class="result-status"
                    data-semester="1">

                        <option value="">
                            Select Status
                        </option>

                        <option value="pass">
                            Passed
                        </option>

                        <option value="atkt">
                            ATKT
                        </option>

                    </select>

                </div>

                <div
                id="semester1Container">
                </div>

            </section>

            <!-- SEM 2 -->

            <section class="semester-card">

                <h2>
                    Semester 2
                </h2>

                <div class="form-group">

                    <label>
                        Result Status
                    </label>

                    <select
                    class="result-status"
                    data-semester="2">

                        <option value="">
                            Select Status
                        </option>

                        <option value="pass">
                            Passed
                        </option>

                        <option value="atkt">
                            ATKT
                        </option>

                    </select>

                </div>

                <div
                id="semester2Container">
                </div>

            </section>

            <!-- SEM 3 -->

            <section class="semester-card">

                <h2>
                    Semester 3
                </h2>

                <div class="form-group">

                    <label>
                        Result Status
                    </label>

                    <select
                    class="result-status"
                    data-semester="3">

                        <option value="">
                            Select Status
                        </option>

                        <option value="pass">
                            Passed
                        </option>

                        <option value="atkt">
                            ATKT
                        </option>

                    </select>

                </div>

                <div
                id="semester3Container">
                </div>

            </section>

            <!-- SEM 4 -->

            <section class="semester-card">

                <h2>
                    Semester 4
                </h2>

                <div class="form-group">

                    <label>
                        Result Status
                    </label>

                    <select
                    class="result-status"
                    data-semester="4">

                        <option value="">
                            Select Status
                        </option>

                        <option value="pass">
                            Passed
                        </option>

                        <option value="atkt">
                            ATKT
                        </option>

                    </select>

                </div>

                <div
                id="semester4Container">
                </div>

            </section>

        </div>

        <!-- SUBMIT -->

        <div class="submit-section">

            <button
            id="submitBtn">

                Submit Academic Record

            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
